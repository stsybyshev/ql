# ─────────────────────────────────────────────────────────
# Quantified Life — Nutrition Skill Configuration
# ─────────────────────────────────────────────────────────
# Edit these values to match your personal targets.
# generate.py reads this and embeds it in data.json.
# The portal adapts all widgets automatically.
# ─────────────────────────────────────────────────────────

# ── Body ──
body_weight_kg: 90

# ── Daily targets ──
calories_target: 2700
protein_target_g: 170          # 1.6 g/kg × 90kg
fat_target_g: 80               # ~28% of 2700 kcal
carbs_target_g: 330            # ~47% of 2700 kcal

# ── Protein per kg body weight target ──
# Reference ranges:
#   Sedentary:            0.8 g/kg
#   Active:               1.2–1.6 g/kg
#   Resistance training:  1.6–2.2 g/kg
#   Cutting (fat loss):   1.8–2.4 g/kg
protein_per_kg_target: 1.6

# ── Macro composition targets ──
# Percentages of total calories. Should sum to 100.
# Common splits:
#   Balanced:       25 / 28 / 47
#   High-protein:   30 / 25 / 45
#   Keto:           20 / 65 / 15
#   Zone:           30 / 30 / 40
macro_split_target:
  protein: 25
  fat: 28
  carbs: 47

# ── Heatmap calorie ranges ──
# Defines color band thresholds for the yearly heatmap:
#   kcal = 0:                    purple (fasting)
#   0 < kcal < low_max:         bright green
#   low_max ≤ kcal < normal_max: light green
#   normal_max ≤ kcal < elevated_max: yellow
#   kcal ≥ elevated_max:        orange
heatmap:
  fasting_max: 0
  low_max: 2100
  normal_max: 2700
  elevated_max: 3100

# ── Meal timing ──
# Hour boundaries for the three time-of-day slots.
# Used by generate.py to classify meals into Morning/Midday/Evening.
# Used by the portal for the timeline axis range.
meal_timing:
  timeline_start: 5            # axis starts at 6:00
  timeline_end: 22             # axis ends at 22:00
  morning_end: 11              # Morning = 6:00–10:59
  midday_end: 15               # Midday  = 11:00–14:59
                               # Evening = 15:00–21:59

# ── Summary cards ──
# Trend direction coloring:
#   For calories/fat/carbs: increase = orange, decrease = green
#   For protein: increase = green, decrease = orange (inverse)
# This is handled by generate.py, no config needed — just documenting
# the convention here.
