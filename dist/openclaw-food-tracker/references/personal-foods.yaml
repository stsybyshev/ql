# Personal Foods Cache
# This file stores YOUR recurring meals, home-cooked dishes, and local cafe items.
# The skill checks this file FIRST before popular-foods.yaml or text estimation.
#
# The agent appends entries here when you say "save this for future" or similar.
# You can also add entries manually using the format below.
#
# Fields:
#   name             - canonical name for matching and display
#   aliases          - list of alternate phrasings to recognise
#   qty_default      - assumed quantity when you don't specify
#   unit             - serving unit (egg, cup, 100g, serving, slice, tbsp, etc.)
#   kcal_per_unit    - kilocalories per unit
#   protein_per_unit - grams of protein per unit
#   fat_per_unit     - grams of fat per unit
#   carbs_per_unit   - grams of carbs per unit
#   notes            - optional context (recipe, portion, source)
#   source           - always "learned" for entries in this file

